# Render Blueprint for the Loop realtime server.
# In the Render dashboard: New + -> Blueprint -> point at this repo. Render reads
# this file and creates the service. Fill the env vars marked sync:false in the
# dashboard (they are secrets / per-deploy URLs).
services:
  - type: web
    name: loop-server
    runtime: node
    rootDir: server
    plan: starter # smallest always-on plan; free tier spins down and drops sockets
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false # paste your Supabase project URL
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false # paste your Supabase service-role key
      - key: WEB_ORIGIN
        sync: false # your Vercel URL, e.g. https://loop-web.vercel.app
      - key: PORT
        value: 4000
      - key: MAX_PLAYERS
        value: 100
      - key: HOST_GRACE_SECONDS
        value: 90
      - key: GAME_IDLE_TIMEOUT_SECONDS
        value: 1800
